<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJI Mavic 3 Classic Banner</title>
    <link rel="stylesheet" href="./css/style.css">
    <!-- GSAP -->
     <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="./js/script.js" defer></script>
</head>
<body>

    <a href="https://www.dji.com/mavic-3-classic" target="_blank" id="banner-link" rel="noopener noreferrer">
        <div id="banner-container">
            
            <div id="logo-wrapper">
                <img src="./public/svg/d.svg" id="part-d" class="logo-piece" alt="D">
                <img src="./public/svg/j.svg" id="part-j" class="logo-piece" alt="J">
                <img src="./public/svg/i.svg" id="part-i" class="logo-piece" alt="I">
            </div>

            <div id="drone-wrapper">
                <img src="./public/image/drone.png" id="drone-img" alt="drone">
                <div class="drone-light left-light"></div>
                <div class="drone-light right-light"></div>
            </div>

            <div id="copy-container">
                <h1 class="main-title">MAVIC 3 CLASSIC</h1>
                <p class="sub-title">Explore Vivid</p>
                <button class="cta-button">BUY NOW</button>
            </div>

        </div>
    </a>

</body>
</html>
